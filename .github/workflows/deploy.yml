name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:

  # 🔐 JOB 1: SSH + CHECK
  ssh:
    runs-on: ubuntu-latest

    steps:
      - name: 🔐 SSH & Update Code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd ~/my-project/backend

            git fetch origin main

            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git rev-parse origin/main)

            if [ "$LOCAL" = "$REMOTE" ]; then
              echo "no_changes" > /tmp/deploy_status
              echo "✅ Repo up to date"
            else
              echo "changes" > /tmp/deploy_status
              echo "🚀 New commits found"
              git pull origin main
            fi


  # 🔨 JOB 2: BUILD
  build:
    runs-on: ubuntu-latest
    needs: ssh   # ⬅️ depends on ssh job

    steps:
      - name: 🔨 Build Docker Image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            STATUS=$(cat /tmp/deploy_status)

            if [ "$STATUS" = "no_changes" ]; then
              echo "⏭️ Skipping build"
              exit 0
            fi

            cd ~/my-project
            docker compose build backend

            echo "✅ Build success"


  # 🚀 JOB 3: DEPLOY
  deploy:
    runs-on: ubuntu-latest
    needs: build   # ⬅️ depends on build job

    steps:
      - name: 🚀 Deploy Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            STATUS=$(cat /tmp/deploy_status)

            if [ "$STATUS" = "no_changes" ]; then
              echo "⏭️ Skipping deploy"
              exit 0
            fi

            cd ~/my-project
            docker compose up -d backend

            echo "✅ Deployment complete"