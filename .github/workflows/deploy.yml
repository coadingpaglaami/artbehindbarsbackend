name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # 🔐 STEP 1: SSH + CHECK + PULL
      - name: 🔐 SSH & Update Code
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            echo "🔐 Checking repo..."

            cd ~/my-project/backend

            git fetch origin main

            LOCAL=$(git rev-parse HEAD)
            REMOTE=$(git rev-parse origin/main)

            if [ "$LOCAL" = "$REMOTE" ]; then
              echo "no_changes" > /tmp/deploy_status
              echo "✅ Repo up to date"
            else
              echo "changes" > /tmp/deploy_status
              echo "🚀 New commits found"
              git pull origin main
            fi


      # 🔨 STEP 2: BUILD
      - name: 🔨 Build Docker Image
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            STATUS=$(cat /tmp/deploy_status)

            if [ "$STATUS" = "no_changes" ]; then
              echo "⏭️ Skipping build (no changes)"
              exit 0
            fi

            echo "🔨 Building image..."

            cd ~/my-project
            docker compose build backend

            echo "✅ Build success"


      # 🚀 STEP 3: DEPLOY
      - name: 🚀 Deploy Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            STATUS=$(cat /tmp/deploy_status)

            if [ "$STATUS" = "no_changes" ]; then
              echo "⏭️ Skipping deploy (no changes)"
              exit 0
            fi

            echo "🚀 Deploying..."

            cd ~/my-project
            docker compose up -d backend

            echo "✅ Deployment complete"